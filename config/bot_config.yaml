app:
  name: "paper-reading-assistant"
  timezone: "Asia/Shanghai"
  daily_top_n: 5
  weekly_per_topic_n: 2
  # Optional: if empty, all matched topics are kept.
  selected_topics: []
  # If true, `run` prompts for domain + keywords from domain_keyword_catalog (unless you pass --selected-*).
  interactive_on_run: false

storage:
  sqlite_path: "data/papers.db"
  raw_cache_dir: "data/raw"

sources:
  arxiv:
    enabled: true
    base_url: "https://export.arxiv.org/api/query"
    categories:
      - "cs.CL"
      - "cs.AI"
      - "cs.LG"
    max_results: 100
  openreview:
    enabled: true
    base_url: "https://api2.openreview.net/notes"
    venues:
      - "ICLR.cc"
      - "NeurIPS.cc"
      - "ICML.cc"
      - "aclweb.org"
    limit: 100
  semantic_scholar:
    enabled: true
    base_url: "https://api.semanticscholar.org/graph/v1/paper/search"
    query: "large language model reasoning agent post-training reinforcement learning"
    limit: 100
  papers_with_code:
    enabled: true
    base_url: "https://paperswithcode.com/api/v1/papers/"
    limit: 100

topics:
  reasoning:
    aliases:
      - "reasoning"
      - "chain-of-thought"
      - "inference-time compute"
      - "search and planning"
      - "self-consistency"
  agent:
    aliases:
      - "agent"
      - "tool use"
      - "function calling"
      - "multi-agent"
      - "planning and acting"
  post_training:
    aliases:
      - "post-training"
      - "alignment"
      - "instruction tuning"
      - "preference optimization"
      - "dpo"
      - "ppo"
      - "rlhf"
  rl:
    aliases:
      - "reinforcement learning"
      - "policy optimization"
      - "reward model"
      - "actor critic"
      - "offline rl"

# Broad domain -> candidate keywords. Users can freely extend this
# for any research area and then multi-select keywords via CLI.
domain_keyword_catalog:
  llm:
    - "post-training"
    - "pre-training"
    - "instruction tuning"
    - "alignment"
    - "rlhf"
    - "dpo"
    - "reasoning"
    - "chain-of-thought"
    - "tool use"
    - "multi-agent"
    - "retrieval augmented generation"
    - "long context"
    - "inference-time compute"
  computer_vision:
    - "vision transformer"
    - "diffusion"
    - "image segmentation"
    - "object detection"
    - "self-supervised learning"
    - "multimodal"
  reinforcement_learning:
    - "policy optimization"
    - "offline rl"
    - "model-based rl"
    - "reward modeling"
    - "actor critic"

scoring:
  weights:
    topic_fit: 0.35
    venue_signal: 0.20
    author_org_signal: 0.15
    impact_signal: 0.15
    method_novelty: 0.10
    evidence_strength: 0.05

summary:
  provider: "api"
  api_provider: "deepseek"
  base_url: "https://api.deepseek.com/v1/chat/completions"
  api_key_env: "DEEPSEEK_API_KEY"
  model: "deepseek-chat"
  max_input_chars: 12000

export:
  excel_path: "data/recommendations.xlsx"
  csv_path: "data/recommendations.csv"
  # Append-only log of each push (Excel-friendly UTF-8 BOM). Set to "" to disable.
  push_history_csv: "data/pushed_history.csv"
  notion:
    enabled: false
    database_id: ""
    token_env: "NOTION_API_KEY"
  obsidian:
    enabled: true
    # Single-file digest into your vault (Obsidian note path). Forward slashes work on Windows.
    # output_path: "D:/Obsidian Vault/LLM/Paper Recommender.md"
    output_path: "D:/Obsidian Vault/LLM/Paper Recommender.md"
    one_note_per_paper: false
    vault_path: ""
  google_sheet:
    enabled: false
    spreadsheet_id: ""
    credentials_json: ""

push:
  channels:
    - "markdown_report"
  markdown_report_path: "data/daily_digest.md"
